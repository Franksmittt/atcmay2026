<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Alberton Campaigns — Social Media Calendar</title>
  <style>
    :root {
      --orange: #f97316;
      --orange-dark: #ea580c;
      --black: #0f0f0f;
      --gray-900: #171717;
      --gray-800: #262626;
      --gray-700: #404040;
      --gray-500: #737373;
      --gray-200: #e5e5e5;
      --white: #ffffff;
      --green: #22c55e;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: "Segoe UI", system-ui, -apple-system, sans-serif;
      background: var(--black);
      color: var(--white);
      min-height: 100vh;
      line-height: 1.5;
    }

    .header {
      background: linear-gradient(135deg, var(--gray-900) 0%, var(--black) 100%);
      border-bottom: 3px solid var(--orange);
      padding: 2rem 1.5rem;
    }

    .header-inner {
      max-width: 1200px;
      margin: 0 auto;
    }

    .header h1 {
      font-size: 1.75rem;
      font-weight: 700;
      margin-bottom: 0.25rem;
    }

    .header h1 span {
      color: var(--orange);
    }

    .header p {
      color: var(--gray-500);
      font-size: 0.95rem;
    }

    .stats {
      display: flex;
      gap: 1rem;
      margin-top: 1.25rem;
      flex-wrap: wrap;
    }

    .stat {
      background: var(--gray-800);
      border: 1px solid var(--gray-700);
      border-radius: 8px;
      padding: 0.6rem 1rem;
      font-size: 0.85rem;
    }

    .stat strong {
      color: var(--orange);
    }

    main {
      max-width: 1200px;
      margin: 0 auto;
      padding: 2rem 1.5rem 3rem;
    }

    .calendar-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
      gap: 1.5rem;
    }

    .brand-section {
      margin-bottom: 2rem;
    }

    .brand-section:last-child {
      margin-bottom: 0;
    }

    .brand-title {
      font-size: 1.2rem;
      font-weight: 700;
      margin-bottom: 1rem;
      color: var(--orange);
      border-left: 4px solid var(--orange);
      padding-left: 0.75rem;
    }

    .post-card {
      background: var(--gray-900);
      border: 1px solid var(--gray-800);
      border-radius: 12px;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      transition: border-color 0.2s, transform 0.2s;
    }

    .post-card:hover {
      border-color: var(--orange);
      transform: translateY(-2px);
    }

    .post-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 1rem 1.25rem;
      background: var(--gray-800);
      border-bottom: 1px solid var(--gray-700);
    }

    .post-number {
      background: var(--orange);
      color: var(--black);
      font-weight: 700;
      font-size: 0.75rem;
      padding: 0.25rem 0.6rem;
      border-radius: 4px;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    .post-date {
      text-align: right;
    }

    .post-date .day {
      font-weight: 700;
      font-size: 1.1rem;
    }

    .post-date .time {
      color: var(--orange);
      font-size: 0.85rem;
      font-weight: 600;
    }

    .post-image-wrap {
      position: relative;
      background: var(--black);
      aspect-ratio: 1;
      overflow: hidden;
    }

    .post-image-wrap img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    .image-pending {
      width: 100%;
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 1.5rem;
      color: var(--gray-500);
      font-size: 0.95rem;
      font-weight: 600;
      border: 2px dashed var(--gray-700);
    }

    .post-body {
      padding: 1.25rem;
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: 1rem;
    }

    .caption-label {
      font-size: 0.75rem;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--gray-500);
      font-weight: 600;
    }

    .caption-box {
      background: var(--black);
      border: 1px solid var(--gray-700);
      border-radius: 8px;
      padding: 0.85rem 1rem;
      font-size: 0.9rem;
      color: var(--gray-200);
      min-height: 100px;
      white-space: pre-wrap;
      word-break: break-word;
    }

    .caption-box.placeholder {
      color: var(--gray-500);
      font-style: italic;
    }

    .actions {
      display: flex;
      gap: 0.75rem;
      margin-top: auto;
    }

    .btn {
      flex: 1;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 0.5rem;
      padding: 0.75rem 1rem;
      border: none;
      border-radius: 8px;
      font-size: 0.875rem;
      font-weight: 600;
      cursor: pointer;
      text-decoration: none;
      transition: background 0.2s, transform 0.1s;
    }

    .btn:active {
      transform: scale(0.98);
    }

    .btn-download {
      background: var(--gray-700);
      color: var(--white);
    }

    .btn-download:hover {
      background: var(--gray-500);
    }

    .btn-copy {
      background: var(--orange);
      color: var(--black);
    }

    .btn-copy:hover {
      background: var(--orange-dark);
    }

    .btn-copy.copied {
      background: var(--green);
      color: var(--white);
    }

    .toast {
      position: fixed;
      bottom: 2rem;
      left: 50%;
      transform: translateX(-50%) translateY(100px);
      background: var(--green);
      color: var(--white);
      padding: 0.85rem 1.5rem;
      border-radius: 8px;
      font-weight: 600;
      font-size: 0.9rem;
      opacity: 0;
      transition: transform 0.3s, opacity 0.3s;
      z-index: 100;
      pointer-events: none;
    }

    .toast.show {
      transform: translateX(-50%) translateY(0);
      opacity: 1;
    }

    @media (max-width: 480px) {
      .actions {
        flex-direction: column;
      }
    }
  </style>
</head>
<body>
  <header class="header">
    <div class="header-inner">
      <h1>Alberton <span>Campaign</span> Calendar</h1>
      <p>Social Media Posting Calendar — June 2026</p>
      <div class="stats">
        <div class="stat"><strong>6</strong> posts scheduled</div>
        <div class="stat">Post time: <strong>10:00 AM</strong> daily</div>
        <div class="stat">2 June — 9 June 2026</div>
      </div>
    </div>
  </header>

  <main>
    <div id="calendar-sections"></div>
  </main>

  <div class="toast" id="toast">Caption copied!</div>

  <script>
    const posts = [

      },
      {
        number: 2,
        brand: "Alberton Tyre Clinic",
        date: "Wednesday, 3 June 2026",
        shortDate: "3 June",
        image: "ATCDUNLOP.jpg",
        downloadName: "atc_03Jun_dunlop.jpg",
        caption: `Looking for premium performance? 🏎️💨

      },
      {
        number: 6,
        brand: "Alberton Tyre Clinic",
        date: "Tuesday, 9 June 2026",
        shortDate: "9 June",
        image: "ATC_MAXXIS_RAZR_9JUN.png",
        downloadName: "atc_09Jun_maxxis_razr.png",
        caption: `Structural dominance. The Maxxis RAZR AT811 delivers a 3-ply armour sidewall for severe terrain abuse with predictable 60/40 on-road discipline.

Status: IN STOCK. Secure your set.

📞 011 907 8495

📍 Alberton Tyre Clinic

#MaxxisTires #RazrAT811 #AlbertonTyreClinic #Alberton #4x4SouthAfrica #OffRoadTires #TreadAggression #OverlandingSA`
      },
      {
        number: 3,
        brand: "Alberton Battery Mart",
        date: "Tuesday, 2 June 2026",
        shortDate: "2 June",
        image: "ABM657.jpg",
        downloadName: "abm_02Jun_657.jpg",
        caption: `Power Plus 657: Relentless Reliability.

Engineered for those who don’t do downtime. Get the high-performance 72Ah power you need to stay on the road.

R 1 950.00 | 24-Month Warranty

📍 Visit us: 28 St Columb Rd, New Redruth, Alberton
📞 Call: 010 109 6211
💬 WhatsApp: 082 304 6926
🌐 Shop online: https://www.albertonbatterymart.co.za/

#AlbertonBatteryMart #PowerPlus #Alberton #CarBattery #AlbertonBusiness #ReliablePower`
      },
      {
        number: 4,
        brand: "Alberton Battery Mart",
        date: "Wednesday, 3 June 2026",
        shortDate: "3 June",
        image: "AMB658AGM.jpg",
        downloadName: "abm_03Jun_658agm.jpg",
        caption: `Power Plus 658 AGM: Precision Power for Your BMW.

      },
      {
        number: 5,
        brand: "Alberton Battery Mart",
        date: "Thursday, 4 June 2026",
        shortDate: "4 June",
        image: "ABM669.jpg",
        downloadName: "abm_04Jun_669.jpg",
        caption: `Power Plus 669: Absolute Power.

Built for the heavy hitters. Whether you're running a heavy-duty SUV or pushing your Isuzu bakkie to the limit, the 669 delivers a massive 900 CCA to ensure you never lose momentum.

📞 Call: 010 109 6211
💬 WhatsApp: 082 304 6926
Visit: https://www.albertonbatterymart.co.za/

#AlbertonBatteryMart #PowerPlus #IsuzuSA #HeavyDutyPower #Alberton #IsuzuBakkie #OffroadReady #CarBattery #ReliablePerformance`
      }
    ];

    const calendarSections = document.getElementById("calendar-sections");
    const toast = document.getElementById("toast");
    let toastTimer;

    function showToast(message) {
      toast.textContent = message;
      toast.classList.add("show");
      clearTimeout(toastTimer);
      toastTimer = setTimeout(() => toast.classList.remove("show"), 2500);
    }

    function copyCaption(text, button) {
      navigator.clipboard.writeText(text).then(() => {
        button.classList.add("copied");
        button.textContent = "Copied!";
        showToast("Caption copied to clipboard!");
        setTimeout(() => {
          button.classList.remove("copied");
          button.innerHTML = "&#128203; Copy Caption";
        }, 2000);
      }).catch(() => {
        const textarea = document.createElement("textarea");
        textarea.value = text;
        document.body.appendChild(textarea);
        textarea.select();
        document.execCommand("copy");
        document.body.removeChild(textarea);
        showToast("Caption copied to clipboard!");
      });
    }

    async function downloadImage(imagePath, filename) {
      try {
        const res = await fetch(imagePath, { cache: "no-store" });
        if (!res.ok) throw new Error("Fetch failed");
        const blob = await res.blob();
        const url = URL.createObjectURL(blob);
        const a = document.createElement("a");
        a.href = url;
        a.download = filename || "download.jpg";
        document.body.appendChild(a);
        a.click();
        a.remove();
        URL.revokeObjectURL(url);
        return;
      } catch (_) {
        const a = document.createElement("a");
        a.href = imagePath;
        a.download = filename || "download.jpg";
        document.body.appendChild(a);
        a.click();
        a.remove();
      }
    }

    const brands = ["Alberton Tyre Clinic", "Alberton Battery Mart"];

    brands.forEach((brand) => {
      const section = document.createElement("section");
      section.className = "brand-section";

      const title = document.createElement("h2");
      title.className = "brand-title";
      title.textContent = brand;
      section.appendChild(title);

      const grid = document.createElement("div");
      grid.className = "calendar-grid";

      posts
        .filter((post) => post.brand === brand)
        .forEach((post) => {
          const isPlaceholder = post.caption.startsWith("Caption coming soon");
          const card = document.createElement("article");
          card.className = "post-card";
          card.innerHTML = `
            <div class="post-header">
              <span class="post-number">Post ${post.number}</span>
              <div class="post-date">
                <div class="day">${post.date}</div>
                <div class="time">10:00 AM</div>
              </div>
            </div>
            <div class="post-image-wrap">
              ${post.imagePending
                ? `<div class="image-pending">Image coming soon</div>`
                : `<img src="${post.image}" alt="Post ${post.number} — ${post.brand}">`}
            </div>
            <div class="post-body">
              <div class="caption-label">Caption</div>
              <div class="caption-box${isPlaceholder ? " placeholder" : ""}" id="caption-${post.number}">${post.caption}</div>
              <div class="actions">
                <button class="btn btn-download btn-download-js" data-image="${post.image}" data-filename="${post.downloadName}"${post.imagePending ? " disabled style=\"opacity:0.5;cursor:not-allowed\"" : ""}>
                  &#11015; Download Image
                </button>
                <button class="btn btn-copy" data-post="${post.number}">
                  &#128203; Copy Caption
                </button>
              </div>
            </div>
          `;
          grid.appendChild(card);
        });

      section.appendChild(grid);
      calendarSections.appendChild(section);
    });

    document.querySelectorAll(".btn-download-js").forEach((button) => {
      button.addEventListener("click", async () => {
        const imagePath = button.dataset.image;
        const filename = button.dataset.filename;
        await downloadImage(imagePath, filename);
      });
    });

    document.querySelectorAll(".btn-copy").forEach((button) => {
      button.addEventListener("click", () => {
        const postNum = button.dataset.post;
        const captionEl = document.getElementById(`caption-${postNum}`);
        copyCaption(captionEl.textContent, button);
      });
    });
  </script>
</body>
</html>
